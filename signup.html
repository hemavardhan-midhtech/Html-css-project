<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sign Up</title>
    <link rel="stylesheet" href="styles.css">
</head>
<body class="auth-body">
    <div class="auth-card">
        <h1>Sign Up</h1>
        <p class="auth-subtitle">Create your account to continue into the portfolio experience.</p>
        <form id="signup-form">
            <div class="form-group">
                <label for="name">Full Name</label>
                <input type="text" id="name" name="name" autocomplete="name" required>
            </div>
            <div class="form-group">
                <label for="email">Email</label>
                <input type="email" id="email" name="email" autocomplete="email" required>
            </div>
            <div class="form-group">
                <label for="password">Password</label>
                <input type="password" id="password" name="password" autocomplete="new-password" minlength="6" required>
            </div>
            <button class="btn btn-full" type="submit">Sign Up</button>
        </form>
        <p class="helper-text">Already have an account? <a href="login.html">Login</a></p>
    </div>
    <script>
        document.getElementById("signup-form").addEventListener("submit", function (event) {
            event.preventDefault();
            window.location.href = "login.html";
        });
    </script>
    <script src="script.js"></script>
</body>
</html>
